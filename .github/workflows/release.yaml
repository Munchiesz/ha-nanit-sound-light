name: Release

on:
  release:
    types: [published]

jobs:
  attach-artifact:
    name: Attach nanit_sound_light.zip
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Create integration zip
        # HACS with `zip_release: true` + `filename: nanit_sound_light.zip`
        # expects the INTEGRATION FOLDER CONTENTS at the zip root
        # (manifest.json, __init__.py, etc. at root) — HACS extracts the
        # zip directly into /config/custom_components/<domain>/.
        run: |
          cd custom_components/nanit_sound_light
          zip -r ../../nanit_sound_light.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" nanit_sound_light.zip --clobber
